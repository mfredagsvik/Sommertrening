<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sommertrening G2014</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="app">
    <header class="hero">
      <div class="badge">⚽ Gutter 2014</div>
      <h1>Sommertrening 2025</h1>
      <p>Velg navn, uke og trening. Kryss av og registrer fullført.</p>
    </header>

    <section class="card">
      <h2>1. Velg navn</h2>
      <div id="playerButtons" class="button-grid"></div>
    </section>

    <section class="card">
      <h2>2. Velg uke</h2>
      <div id="weekButtons" class="button-grid"></div>
    </section>

    <section class="card">
      <h2>3. Velg trening</h2>
      <div id="sessionButtons" class="button-grid two"></div>
    </section>

    <section class="card">
      <h2 id="sessionTitle"></h2>
      <p id="sessionIntro" class="intro"></p>
      <div id="exerciseList" class="exercise-list"></div>
      <button id="completeBtn" class="primary">✅ Registrer fullført</button>
      <p id="message" class="message"></p>
    </section>

    <section class="card status-card">
      <h2>Status valgt uke</h2>
      <div class="status-number"><span id="completedCount">0</span> av <span id="totalPlayers">0</span></div>
      <p>spillere har registrert minst én trening denne uka.</p>
      <details open>
        <summary>Hvem har fullført?</summary>
        <ul id="completedPlayers"></ul>
      </details>
    </section>

    <section class="card coach-card">
      <h2>Trener</h2>
      <button id="exportBtn" class="secondary">Last ned registreringer CSV</button>
      <button id="resetBtn" class="danger">Nullstill testdata</button>
    </section>
  </main>
  <script src="app.js"></script>
</body>
</html>
